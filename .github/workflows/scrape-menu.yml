name: Scrape lunch menu

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run scraper
        run: python scripts/scrape_menu.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync menu to database
        if: secrets.DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run db:migrate
          npm run db:sync-menu

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/lunch_menu.csv public/lunch_menu.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update lunch menu [skip ci]" &&
            git push
          )
